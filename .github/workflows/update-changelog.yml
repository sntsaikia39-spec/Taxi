name: Update Changelog

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Changelog
        run: |
          # Get the latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_HASH=$(git log -1 --pretty=%h)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_DATE=$(git log -1 --pretty=%ai)
          
          # Create backup of changelog
          cp changelog.md changelog.md.bak
          
          # Create new entry
          {
            echo "## [$(date +%Y-%m-%d)] - Commit $COMMIT_HASH"
            echo ""
            echo "**Author:** $COMMIT_AUTHOR"
            echo ""
            echo "### Changes"
            echo "- $COMMIT_MSG"
            echo ""
            cat changelog.md.bak
          } > changelog_new.md
          
          # Replace the file
          mv changelog_new.md changelog.md
          rm -f changelog.md.bak

      - name: Commit and Push Changelog
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if changelog was modified
          if git diff --quiet changelog.md; then
            echo "No changes to changelog"
          else
            git add changelog.md
            git commit -m "docs: auto-update changelog [skip ci]" || true
            git push
          fi
